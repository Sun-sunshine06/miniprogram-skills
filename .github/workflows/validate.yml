name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Ensure vendored dependencies are not committed
        run: test ! -d tools/wechat-gui-check/node_modules

      - name: Run shared validation workflow (docs + dry-run-only GUI coverage)
        shell: pwsh
        run: ./scripts/check.ps1 -IncludeAudit
